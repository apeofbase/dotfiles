# RTFM https://linux.die.net/man/1/tmux
setw -g mode-keys vi

bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# fix for pbcopy not working in tmux
# run first: brew install reattach-to-user-namespace
#set -g default-command "reattach-to-user-namespace -l zsh"

# Binds {{{
unbind C-b
set -g prefix M-e
bind M-e send-prefix
bind r source-file ~/.tmux.conf

set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1

# Panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind y setw synchronize-panes

# Splits
bind -n M-\\ split-window -h
bind -n M-- split-window -v
bind-key -nr    M-Up resize-pane -U
bind-key -nr  M-Down resize-pane -D
bind-key -nr  M-Left resize-pane -L
bind-key -nr M-Right resize-pane -R

# Navigation
bind -n M-= select-layout even-horizontal
bind -n M-+ select-layout even-vertical
bind -n M-n next-window
bind -n M-p previous-window

# Not sure yet
bind-key -n M-PPage copy-mode -u
bind-key -n M-u copy-mode
bind-key -n M-i paste-buffer

bind-key -n M-8 choose-session
bind-key -n M-9 switch-client -p
bind-key -n M-0 switch-client -n
# }}}

# Options {{{
setw -g mouse on

# Recommended by Neovim :checkhealth report
set-option -g focus-events on

set-option -g history-limit 20000
# }}}

set -g default-terminal "screen-256color"

# set true color settings
# $TERM value outside of tmux
set-option -sa terminal-overrides ',alacritty:RGB'

# Status {{{
set -g status on
set -g status-style fg=cyan,bg=colour234
set -g status-interval 1 # sets update interval, default 15

set -g status-left '#[bg=cyan,fg=black] #S '
set -g status-left-length 40

set -g status-right "%b %d %H:%M "
set -g status-right-length 120

setw -g window-status-current-format ' #I: #W '
set -g window-status-current-style fg=colour234,bg=cyan,bold
setw -g window-status-format ' #I: #W '
set -g window-status-style fg=colour245,bg=colour235,dim 

# }}}

# loud or quiet
setw -g monitor-activity off
set -g visual-activity off 
set -g visual-silence off 
set -g visual-bell off
set -g bell-action none

set -g set-titles on
set -g set-titles-string '#S: #W'
setw -g automatic-rename
set -g allow-rename off

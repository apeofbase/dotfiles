import = ["~/dotfiles/alacritty/themes/tokyonight.toml"]
live_config_reload = true

[colors]
draw_bold_text_with_bright_colors = true

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 750
vi_mode_style = { shape = "Block", blinking = "On" }
unfocused_hollow = true
thickness = 0.15

[env]
TERM = "xterm-256color"

[font]
size = 15.0

[font.bold]
family = "DankMono Nerd Font"
style = "Bold"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "DankMono Nerd Font"
style = "Italic"

[font.normal]
family = "DankMono Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[window]
decorations = "none"
dynamic_padding = true
opacity = 1
startup_mode = "Maximized"
# MacOS overrides
#option_as_alt = "OnlyLeft"
#decorations = "buttonless"

[window.padding]
x = 20
y = 20

[window.position]
x = 0
y = 0
